version: "3.9"
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://gonogo:gonogo@db:5432/gonogo
    depends_on: [db]
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on: [backend]
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gonogo
      POSTGRES_PASSWORD: gonogo
      POSTGRES_DB: gonogo
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
volumes:
  pgdata:
